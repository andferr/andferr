<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/favicon.ico">
    <title>Blog | Pinto Solutions</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        html {
            background-color: rgb(17 24 39);
            background-image: url("data:image/svg+xml,%3Csvg width='30' height='30' viewBox='0 0 30 30' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1.22676 0C1.91374 0 2.45351 0.539773 2.45351 1.22676C2.45351 1.91374 1.91374 2.45351 1.22676 2.45351C0.539773 2.45351 0 1.91374 0 1.22676C0 0.539773 0.539773 0 1.22676 0Z' fill='rgba(255,255,255,0.15)'/%3E%3C/svg%3E");
            background-position: center;
            min-height: 100%;
        }
        body {
            padding: 0;
            margin: 0;
            font-family: 'Oswald', sans-serif;
            color: white;
            min-height: 100vh;
        }
        .page-content {
            width: 100%;
            min-height: 100vh;
            padding: 1rem 1rem;
            box-sizing: border-box;
        }
        .blog-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 1rem;
        }
        .blog-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5em;
            letter-spacing: 0.2em;
            margin: 0;
        }
        .blog-title a {
            color: white;
            text-decoration: none;
        }
        .blog-title a:hover {
            opacity: 0.9;
        }
        .lang-switcher {
            display: flex;
            gap: 8px;
        }
        .button {
            font-family: 'Oswald', sans-serif;
            box-sizing: border-box;
            border-width: 0;
            border-style: solid;
            border-color: #e5e7eb;
            background-color: rgb(37 42 55 / 0.5);
            padding: 10px 20px;
            color: white;
            border-radius: 0.5rem;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .button.active {
            background-color: rgb(55 65 81);
        }
        .button-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
        }
        #post-list {
            max-width: 640px;
            margin: 0 auto;
        }
        .list-view-inner {
            display: flex;
            gap: 2rem;
            max-width: 960px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .list-view-main {
            flex: 1;
            min-width: 0;
        }
        .blog-sidebar {
            width: 260px;
            flex-shrink: 0;
            background-color: rgb(37 42 55 / 0.5);
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: center;
        }
        .blog-sidebar .profile-photo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: block;
        }
        .blog-sidebar .profile-name {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            margin: 0 0 0.25rem;
            color: white;
        }
        .blog-sidebar .profile-role {
            font-size: 0.9rem;
            opacity: 0.85;
            margin: 0 0 1rem;
        }
        .blog-sidebar .profile-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 0.5rem;
        }
        .blog-sidebar .profile-buttons .button {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .blog-sidebar .profile-buttons .button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .post-card {
            background-color: rgb(37 42 55 / 0.5);
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: transform 0.15s, background-color 0.15s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            background-color: rgb(37 42 55 / 0.8);
        }
        .post-card h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
            font-weight: 400;
        }
        .post-card .post-date {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .post-card .post-tags {
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        .post-card .tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 0.25rem;
        }
        .blog-filters {
            max-width: 640px;
            margin: 0 auto 1.5rem;
        }
        .blog-filters .search-wrap {
            margin-bottom: 0.75rem;
        }
        .blog-filters input[type="search"] {
            width: 100%;
            max-width: 320px;
            padding: 0.5rem 0.75rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgb(37 42 55 / 0.5);
            color: white;
            box-sizing: border-box;
        }
        .blog-filters input[type="search"]::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .blog-filters .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .blog-filters .tags-wrap .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .blog-filters .tag-btn {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            padding: 0.35rem 0.65rem;
            border-radius: 0.5rem;
            border: 0;
            background: rgb(37 42 55 / 0.5);
            color: white;
            cursor: pointer;
        }
        .blog-filters .tag-btn:hover {
            background: rgb(37 42 55 / 0.8);
        }
        .blog-filters .tag-btn.active {
            background: rgb(55 65 81);
        }
        #post-view {
            max-width: 720px;
            margin: 0 auto;
            display: none;
        }
        #post-view.visible {
            display: block;
        }
        #list-view.hidden {
            display: none;
        }
        .post-article {
            background-color: rgb(37 42 55 / 0.5);
            border-radius: 0.5rem;
            padding: 1.5rem 2rem;
            line-height: 1.6;
        }
        .post-article h1,
        .post-article h2,
        .post-article h3 {
            font-family: 'Oswald', sans-serif;
            font-weight: 400;
        }
        .post-article h1 { font-size: 1.5rem; }
        .post-article h2 {
            font-size: 1.25rem;
            margin-top: 1.75rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.95);
        }
        .post-article h2:first-of-type { margin-top: 0; }
        .post-article h3 {
            font-size: 1.1rem;
            margin-top: 1.35rem;
            margin-bottom: 0.4rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
        }
        .post-article h3:first-of-type { margin-top: 0; }
        .post-article p { margin: 0.75rem 0; }
        .post-article ul, .post-article ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .post-article a { color: #93c5fd; }
        .post-article a:hover { text-decoration: underline; }
        .post-article img { max-width: 100%; height: auto; border-radius: 0.25rem; }
        .post-article pre {
            background: rgb(17 24 39);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.9rem;
        }
        .post-article code { font-family: monospace; }
        .post-article pre code { background: none; padding: 0; }
        .post-meta {
            opacity: 0.85;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .post-article .post-tags {
            margin-bottom: 1rem;
        }
        .post-article .tag {
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 0.25rem;
            margin-right: 0.35rem;
        }
        .post-article .post-signature {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.15);
            text-align: right;
            font-style: italic;
            opacity: 0.9;
            font-size: 0.95rem;
        }
        .loading, .error {
            text-align: center;
            padding: 2rem;
            opacity: 0.9;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
        }
        @media only screen and (max-width: 500px) {
            .blog-header { flex-direction: column; align-items: flex-start; }
            .post-article { padding: 1rem 1.25rem; }
        }
        @media only screen and (max-width: 900px) {
            .list-view-inner { flex-direction: column; }
            .blog-sidebar { width: 100%; max-width: 320px; margin: 0 auto; }
        }
    </style>
</head>

            <p id="post-error" class="error" style="display:none;">Não foi possível carregar o post.</p>

    <script>
        (function () {
            var pathname = window.location.pathname || '/';
            var base = pathname.replace(/\/[^/]*$/, '') || '/';
            if (!base.endsWith('/')) base += '/';
            const LIST_URL = base + 'content/list.json';
            const POSTS_BASE = base + 'content/';
            let lang = localStorage.getItem('blog-lang') || 'pt';
            let posts = [];

            const listView = document.getElementById('list-view');
            const postView = document.getElementById('post-view');
            const postList = document.getElementById('post-list');
            const postContent = document.getElementById('post-content');
            const listLoading = document.getElementById('list-loading');
            const listError = document.getElementById('list-error');
            const listEmpty = document.getElementById('list-empty');
            const postLoading = document.getElementById('post-loading');
            const postError = document.getElementById('post-error');
            const backLink = document.getElementById('back-link');
            const searchInput = document.getElementById('search-input');
            const tagFiltersEl = document.getElementById('tag-filters');
            const tagsLabel = document.getElementById('tags-label');

            let selectedTag = '';
            let searchQuery = '';

            function getMainTags(postsList) {
                const count = {};
                postsList.forEach(function (p) {
                    const t = p.tags;
                    if (Array.isArray(t)) t.forEach(function (tag) { count[tag] = (count[tag] || 0) + 1; });
                });
                return Object.keys(count).sort(function (a, b) { return count[b] - count[a]; });
            }

            function filterPosts() {
                let list = posts;
                if (selectedTag) {
                    list = list.filter(function (p) {
                        return Array.isArray(p.tags) && p.tags.indexOf(selectedTag) >= 0;
                    });
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase().trim();
                    list = list.filter(function (p) {
                        const titlePt = (p.title_pt || '').toLowerCase();
                        const titleEn = (p.title_en || '').toLowerCase();
                        const slug = (p.slug || '').toLowerCase();
                        return titlePt.indexOf(q) >= 0 || titleEn.indexOf(q) >= 0 || slug.indexOf(q) >= 0;
                    });
                }
                return list;
            }

            function updateFiltersUi() {
                searchInput.placeholder = lang === 'pt' ? 'Buscar posts…' : 'Search posts…';
                tagsLabel.textContent = lang === 'pt' ? 'Tags:' : 'Tags:';
                listEmpty.textContent = lang === 'pt' ? 'Nenhum post encontrado.' : 'No posts found.';
            }

            function setLang(newLang) {
                lang = newLang;
                localStorage.setItem('blog-lang', lang);
                document.querySelectorAll('.lang-switcher .button').forEach(function (btn) {
                    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
                    btn.setAttribute('aria-pressed', btn.getAttribute('data-lang') === lang ? 'true' : 'false');
                });
                renderList();
                renderTagFilters();
                if (postView.classList.contains('visible')) {
                    const slug = postView.getAttribute('data-slug');
                    if (slug) loadPost(slug);
                }
            }

            function renderTagFilters() {
                const mainTags = getMainTags(posts);
                tagFiltersEl.parentElement.style.display = mainTags.length ? '' : 'none';
                tagFiltersEl.innerHTML = mainTags.map(function (tag) {
                    const active = selectedTag === tag ? ' active' : '';
                    return '<button type="button" class="tag-btn' + active + '" data-tag="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</button>';
                }).join('');
                tagFiltersEl.querySelectorAll('.tag-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        selectedTag = selectedTag === btn.getAttribute('data-tag') ? '' : btn.getAttribute('data-tag');
                        renderTagFilters();
                        renderList();
                    });
                });
            }

            function renderList() {
                const filtered = filterPosts();
                updateFiltersUi();
                const key = lang === 'pt' ? 'title_pt' : 'title_en';
                const dateKey = 'date';
                postList.innerHTML = filtered.map(function (p) {
                    const date = p[dateKey] || '';
                    const title = p[key] || p.title_pt || p.title_en || p.slug;
                    const tags = Array.isArray(p.tags) ? p.tags : [];
                    const tagsHtml = tags.length ? '<div class="post-tags">' + tags.map(function (t) {
                        return '<span class="tag">' + escapeHtml(t) + '</span>';
                    }).join('') + '</div>' : '';
                    return '<article class="post-card" data-slug="' + escapeHtml(p.slug) + '">' +
                        '<h2>' + escapeHtml(title) + '</h2>' +
                        '<div class="post-date">' + escapeHtml(formatDate(date)) + '</div>' +
                        tagsHtml +
                        '</article>';
                }).join('');

                listEmpty.style.display = filtered.length === 0 ? 'block' : 'none';

                postList.querySelectorAll('.post-card').forEach(function (el) {
                    el.addEventListener('click', function () {
                        showPost(el.getAttribute('data-slug'));
                    });
                });
            }

            function formatDate(iso) {
                if (!iso) return '';
                const d = new Date(iso);
                if (isNaN(d.getTime())) return iso;
                return lang === 'pt'
                    ? d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
                    : d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
            }

            function escapeHtml(s) {
                if (!s) return '';
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function showList() {
                listView.classList.remove('hidden');
                postView.classList.remove('visible');
                postView.removeAttribute('data-slug');
            }

            function showPost(slug) {
                listView.classList.add('hidden');
                postView.classList.add('visible');
                postView.setAttribute('data-slug', slug);
                backLink.href = '#';
                loadPost(slug);
            }

            backLink.addEventListener('click', function (e) {
                e.preventDefault();
                showList();
                history.replaceState({ view: 'list' }, '', 'blog.html');
            });

            window.addEventListener('popstate', function (e) {
                if (e.state && e.state.view === 'post' && e.state.slug) {
                    showPost(e.state.slug);
                } else {
                    showList();
                }
            });

            function parseFrontmatter(text) {
                const match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!match) return { meta: {}, body: text };
                const meta = {};
                match[1].split('\n').forEach(function (line) {
                    const colon = line.indexOf(':');
                    if (colon > 0) {
                        const k = line.slice(0, colon).trim();
                        let v = line.slice(colon + 1).trim();
                        if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'")))
                            v = v.slice(1, -1);
                        else if (v.startsWith('[')) {
                            try { v = JSON.parse(v); } catch (e) {}
                        }
                        meta[k] = v;
                    }
                });
                return { meta: meta, body: match[2] };
            }

            function extractSections(body) {
                const sections = { pt: '', en: '' };
                const regex = /^##\s+(PT|EN)\s*$/gm;
                let lastIndex = 0;
                let lastLang = null;
                let m;
                while ((m = regex.exec(body)) !== null) {
                    if (lastLang) {
                        sections[lastLang] = body.slice(lastIndex, m.index).trim();
                    }
                    lastLang = m[1].toLowerCase();
                    lastIndex = m.index + m[0].length;
                }
                if (lastLang) {
                    sections[lastLang] = body.slice(lastIndex).trim();
                }
                return sections;
            }

            function loadPost(slug) {
                postError.style.display = 'none';
                postContent.innerHTML = '';
                postLoading.style.display = 'block';
                history.replaceState({ view: 'post', slug: slug }, '', 'blog.html#post-' + slug);

                function tryFetch(url) {
                    return fetch(url).then(function (r) {
                        if (r.ok) return r.text();
                        if (r.status === 404 && url.endsWith('.md')) return tryFetch(POSTS_BASE + slug + '.txt');
                        throw new Error('Post not found');
                    });
                }
                tryFetch(POSTS_BASE + slug + '.md')
                    .then(function (raw) {
                        const { meta, body } = parseFrontmatter(raw);
                        const sections = extractSections(body);
                        const title = lang === 'pt' ? (meta.title_pt || meta.title_en) : (meta.title_en || meta.title_pt);
                        const content = sections[lang] || sections.pt || sections.en || '';
                        const html = marked.parse(content, { gfm: true });
                        const metaTags = Array.isArray(meta.tags) ? meta.tags : [];
                        const tagsHtml = metaTags.length ? '<div class="post-tags">' + metaTags.map(function (t) {
                            return '<span class="tag">' + escapeHtml(String(t)) + '</span>';
                        }).join('') + '</div>' : '';
                        postContent.innerHTML =
                            '<article class="post-article">' +
                            '<h1>' + escapeHtml(title) + '</h1>' +
                            '<div class="post-meta">' + escapeHtml(formatDate(meta.date || '')) + tagsHtml + '</div>' +
                            '<div class="post-body">' + html + '</div>' +
                            '<div class="post-signature">— André Ferreira Pinto</div>' +
                            '</article>';
                        postLoading.style.display = 'none';
                    })
                    .catch(function () {
                        postLoading.style.display = 'none';
                        postError.style.display = 'block';
                        postError.textContent = lang === 'pt' ? 'Não foi possível carregar o post.' : 'Could not load the post.';
                    });
            }

            document.querySelectorAll('.lang-switcher .button').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    setLang(btn.getAttribute('data-lang'));
                });
            });

            searchInput.addEventListener('input', function () {
                searchQuery = searchInput.value;
                renderList();
            });

            fetch(LIST_URL)
                .then(function (r) {
                    if (!r.ok) throw new Error('List failed');
                    return r.json();
                })
                .then(function (data) {
                    posts = Array.isArray(data) ? data : [];
                    posts.forEach(function (p) {
                        if (!Array.isArray(p.tags)) p.tags = [];
                    });
                    listLoading.style.display = 'none';
                    if (posts.length === 0) {
                        postList.innerHTML = '<p class="loading">' + (lang === 'pt' ? 'Nenhum post ainda.' : 'No posts yet.') + '</p>';
                    } else {
                        renderTagFilters();
                        renderList();
                    }
                })
                .catch(function () {
                    listLoading.style.display = 'none';
                    listError.style.display = 'block';
                });

            if (window.location.hash && window.location.hash.startsWith('#post-')) {
                const slug = window.location.hash.slice(6);
                showPost(slug);
            }
        })();
    </script>
</body>
</html>
